name: quizverse_forca
description: "QuizVerse: Forca — jogo mobile offline-first de adivinhação de palavras com sincronização silenciosa de perguntas do GitHub."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Armazenamento offline-first
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Gerenciamento de estado
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Localização PT-BR/EN/IT
  easy_localization: ^3.0.7

  # HTTP para sync com GitHub
  http: ^1.2.2

  # Utilitários
  uuid: ^4.4.2
  path_provider: ^2.1.4
  connectivity_plus: ^6.1.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Mocking e testes de BLoC
  mockito: ^5.4.4
  bloc_test: ^9.1.7
  build_runner: ^2.15.0

flutter:
  uses-material-design: true

  assets:
    - assets/locales/
    - assets/data/
